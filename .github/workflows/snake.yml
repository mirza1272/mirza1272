name: Generate Snake and Streak Stats

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:
  push:
    branches:
    - main
    - master

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create dist directory
        run: mkdir -p dist

      - name: Generate Snake
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Generate streak stats
        uses: DenverCoder1/github-readme-streak-stats@main
        with:
          options: user=${{ github.repository_owner }}&theme=tokyonight&hide_border=true&background=0a0e1a&ring=00e5ff&fire=00b8d4&currStreakLabel=00e5ff&sideLabels=b2ebf2&dates=9d8ca0&currStreakNum=ffffff&sideNums=ffffff
          path: dist/streak.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate trophy stats
        uses: soulteary/github-profile-trophy-action@v1.0.0
        with:
          options: username=${{ github.repository_owner }}&theme=tokyonight&no-frame=true&no-bg=true&margin-w=8&column=7&v=1
          path: dist/trophy.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to Output Branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
